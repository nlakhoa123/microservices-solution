name: Backend CI Pipeline (Feature to Develop PR)

on:
  pull_request:
    branches:
      - develop
    types: [opened, synchronize, reopened]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore MicroservicesSolution.sln

      - name: Build
        run: dotnet build MicroservicesSolution.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test MicroservicesSolution.sln --no-build --configuration Release

  deploy_pr_build:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Trigger Render Deploy Hook
        run: curl -X GET ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Comment on PR with Backend Deployment Status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "⚙️ Backend deployment triggered on Render for this PR branch."
            });
