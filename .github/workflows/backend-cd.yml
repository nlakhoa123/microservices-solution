name: Backend CD Pipeline (Develop to Main Merge)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  build_and_push_docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      - name: Build and push Goods Service
        uses: docker/build-push-action@v7
        with:
          context: .
          file: GoodsService/Dockerfile
          push: true
          tags: |
            yourdockerhub/goods-service:latest
            yourdockerhub/goods-service:${{ github.sha }}

      - name: Build and push User Service
        uses: docker/build-push-action@v7
        with:
          context: .
          file: UserService/Dockerfile
          push: true
          tags: |
            yourdockerhub/user-service:latest
            yourdockerhub/user-service:${{ github.sha }}

      - name: Build and push Message Service
        uses: docker/build-push-action@v7
        with:
          context: .
          file: MessageService/Dockerfile
          push: true
          tags: |
            yourdockerhub/message-service:latest
            yourdockerhub/message-service:${{ github.sha }}

      - name: Build and push UrlShortener Service
        uses: docker/build-push-action@v7
        with:
          context: .
          file: UrlShortenerService/Dockerfile
          push: true
          tags: |
            yourdockerhub/urlshortener-service:latest
            yourdockerhub/urlshortener-service:${{ github.sha }}

      - name: Build and push Api Gateway Service
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ApiGatewayService/Dockerfile
          push: true
          tags: |
            yourdockerhub/api-gateway-service:latest
            yourdockerhub/api-gateway-service:${{ github.sha }}


      - name: Trigger Production Deploy
        run: curl -X GET ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Report Production Deployment Status
        run: echo "Backend production deployment triggered on Render and Docker image pushed to Docker Hub."
