version: '3.9'

services:

  # ── Infrastructure ──────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: unless-stopped
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 20s
      timeout: 10s
      retries: 5

  # ── Backend Services ─────────────────────────────────────────────

  userservice:
    build:
      context: ./UserService
      dockerfile: Dockerfile
    container_name: userservice
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Data Source=/data/users.db
    volumes:
      - userdata:/data
    restart: unless-stopped

  urlshortenerservice:
    build:
      context: ./UrlShortenerService
      dockerfile: Dockerfile
    container_name: urlshortenerservice
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Data Source=/data/urls.db
      - ConnectionStrings__Redis=redis:6379
      - BaseUrl=http://localhost:5000
    volumes:
      - urldata:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  goodsservice:
    build:
      context: ./GoodsService
      dockerfile: Dockerfile
    container_name: goodsservice
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Data Source=/data/goods.db
    volumes:
      - goodsdata:/data
    restart: unless-stopped

  messagebrokerservice:
    build:
      context: ./MessageBrokerService
      dockerfile: Dockerfile
    container_name: messagebrokerservice
    ports:
      - "5004:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Data Source=/data/messages.db
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
    volumes:
      - msgdata:/data
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  apigateway:
    build:
      context: ./ApiGateway
      dockerfile: Dockerfile
    container_name: apigateway
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      - userservice
      - urlshortenerservice
      - goodsservice
      - messagebrokerservice
    restart: unless-stopped

  # ── Frontend ─────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - apigateway
    restart: unless-stopped

volumes:
  userdata:
  urldata:
  goodsdata:
  msgdata:
